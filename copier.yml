---

package_name:
  type: str
  help: What is the name of the rpm package?

package_url:
  type: str
  help: What is the URL of the project?

package_description:
  type: str
  help: What is the description of the rpm package?

package_version:
  type: str
  help: What is the version of the package?

package_include_devel:
  type: bool
  default: false
  help: Will a devel package also be included?

author_name:
  type: str
  help: What is the name of the author?

author_email:
  type: str
  help: What is the email of the author?

_subdirectory: "template"

creation_date:
  type: str
  default: "{{ '%a %b %d %Y' | strftime }}"
  when: false

initial_package_version:
  type: str
  default: "{{ package_version }}"
  when: false

initial_author_name:
  type: str
  default: "{{ author_name }}"
  when: false

initial_author_email:
  type: str
  default: "{{ author_email }}"
  when: false